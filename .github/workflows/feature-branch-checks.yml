name: Feature branch checks

on:
  pull_request:
    branches: [dev, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read check command from .harness-version
        id: config
        run: |
          if [ ! -f .harness-version ]; then
            echo "No .harness-version file found, skipping checks."
            echo "cmd=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHECK_CMD=$(grep '^check:' .harness-version | sed 's/^check: *//' || true)
          echo "cmd=$CHECK_CMD" >> "$GITHUB_OUTPUT"

      - name: Detect package manager
        if: steps.config.outputs.cmd != ''
        id: pm
        run: |
          if [ -f bun.lockb ] || [ -f bun.lock ]; then
            echo "manager=bun" >> "$GITHUB_OUTPUT"
            echo "install=bun install --frozen-lockfile" >> "$GITHUB_OUTPUT"
          elif [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "install=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
          else
            echo "manager=" >> "$GITHUB_OUTPUT"
            echo "install=" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.config.outputs.cmd != '' && steps.pm.outputs.manager != ''
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        if: steps.pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v5

      - name: Setup Bun
        if: steps.pm.outputs.manager == 'bun'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.config.outputs.cmd != '' && steps.pm.outputs.install != ''
        run: ${{ steps.pm.outputs.install }}

      - name: Run checks
        if: steps.config.outputs.cmd != ''
        run: ${{ steps.config.outputs.cmd }}
